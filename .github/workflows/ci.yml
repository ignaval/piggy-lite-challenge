# Fast quality gates for the take-home. Mirrors the commands in each app's
# README. E2E (Playwright) is intentionally left to a local/host run — it needs
# the full stack up and a browser — see frontend/README.md.
name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Migrations apply from scratch and match the models
        env:
          DATABASE_URL: "sqlite:///./ci_migrations.db"
        run: |
          alembic upgrade head   # fails if the migration can't build the schema
          alembic check          # fails if models have drifted from migrations
      - name: Test (pytest)
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test
